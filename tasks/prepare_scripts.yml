---
- name: Ensure acme deploy script dir exists
  ansible.builtin.file:
    path: "{{ acme_deploy_vault_script_dir }}"
    state: "directory"
    mode: "0755"
    recurse: true

- name: Copy vault_push script
  ansible.builtin.template:
    src: "vault_push.sh.j2"
    dest: "{{ acme_deploy_vault_script }}"
    mode: "0755"
